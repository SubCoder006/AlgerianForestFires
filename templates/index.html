<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forest Fire Prediction</title>

<style>
    body {
        font-family: Arial;
        background: #0f172a;
        color: white;
        text-align: center;
        padding: 40px;
    }

    .container {
        background: #1e293b;
        padding: 25px;
        border-radius: 12px;
        width: 400px;
        margin: auto;
    }

    input {
        width: 90%;
        padding: 8px;
        margin: 5px;
        border-radius: 5px;
        border: none;
    }

    button {
        background: #3b82f6;
        color: white;
        padding: 10px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
    }

    table {
        margin-top: 20px;
        width: 100%;
        border-collapse: collapse;
    }

    th, td {
        border: 1px solid #334155;
        padding: 8px;
    }

    th {
        background: #2563eb;
    }

    .result {
        margin-top: 15px;
        font-size: 18px;
        font-weight: bold;
    }
</style>

</head>

<body>
    <div class="container">
        <h2>🔥 Forest Fire Prediction</h2>


    <form action="/predict" method="POST">
        <input type="number" step="any" name="temperature" placeholder="Temperature" required>
        <input type="number" step="any" name="rh" placeholder="RH" required>
        <input type="number" step="any" name="ws" placeholder="Wind Speed" required>
        <input type="number" step="any" name="rain" placeholder="Rain" required>

        <input type="number" step="any" name="ffmc" placeholder="FFMC" required>
        <input type="number" step="any" name="dmc" placeholder="DMC" required>
        <input type="number" step="any" name="isi" placeholder="ISI" required>
        <input type="number" step="any" name="classes" placeholder="Classes (0 or 1)" required>
        <input type="number" step="any" name="region" placeholder="Region (0 or 1)" required>

        <button type="submit">Predict</button>
    </form>

    {% if prediction_text %}

    <table>
        <tr>
            <th>Feature</th>
            <th>Value</th>
        </tr>
        <tr><td>Temperature</td><td>{{ temperature }}</td></tr>
        <tr><td>RH</td><td>{{ rh }}</td></tr>
        <tr><td>Ws</td><td>{{ ws }}</td></tr>
        <tr><td>Rain</td><td>{{ rain }}</td></tr>
        <tr><td>FFMC</td><td>{{ ffmc }}</td></tr>
        <tr><td>DMC</td><td>{{ dmc }}</td></tr>
        <tr><td>ISI</td><td>{{ isi }}</td></tr>
        <tr><td>Classes</td><td>{{ classes }}</td></tr>
        <tr><td>Region</td><td>{{ region }}</td></tr>
    </table>

    <div class="result">
        {{ prediction_text }}
    </div>

    {% endif %}
</div>

</body>
</html>
